<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgl - FBX loader</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<link type="text/css" rel="stylesheet" href="main.css">
	</head>

	<body>
		<div id="info">
			<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - FBXLoader<br />
			Character and animation from <a href="https://www.mixamo.com/" target="_blank" rel="noopener">Mixamo</a>
		</div>

		<button id="startAudio" style="
			position:absolute;
			top:20px;
			right:20px;
			z-index:10;
			padding:10px 16px;
			border:none;
			border-radius:8px;
			background:rgba(0,0,0,0.7);
			color:white;
			cursor:pointer;
		">
			Activar música
		</button>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import Stats from 'three/addons/libs/stats.module.js';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
			import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
			import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

			const manager = new THREE.LoadingManager();

			let camera, scene, renderer, stats, object, loader, guiMorphsFolder;
			let mixer;
			let sound;

			let texture;
			const textureLoader = new THREE.TextureLoader();

			const clock = new THREE.Clock();

			const params = {
				asset: 'Punching Bag'
			};

			const assets = [
				'Samba Dancing',
				'morph_test',
				'monkey',
				'monkey_embedded_texture',
				'vCube',
				'Swing Dancing',
				'Running',
				'Receive Uppercut To The Face',
				'Punching Bag',
				'Crouch To Stand'
			];

			init();

			function init() {

				const container = document.createElement( 'div' );
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 2000 );
				camera.position.set( 100, 200, 300 );

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0xa0a0a0 );
				// scene.fog = new THREE.Fog( 0xa0a0a0, 200, 1000 );

				const hemiLight = new THREE.HemisphereLight( 0xffffff, 0x444444, 5 );
				hemiLight.position.set( 0, 200, 0 );
				scene.add( hemiLight );

				const dirLight = new THREE.DirectionalLight( 0xffffff, 5 );
				dirLight.position.set( 0, 200, 100 );
				dirLight.castShadow = true;
				dirLight.shadow.camera.top = 180;
				dirLight.shadow.camera.bottom = - 100;
				dirLight.shadow.camera.left = - 120;
				dirLight.shadow.camera.right = 120;
				scene.add( dirLight );

				const topLight = new THREE.DirectionalLight( 0xffffff, 2.5 );
				topLight.position.set( 0, 300, 0 );
				topLight.castShadow = true;
				scene.add( topLight );

				const mesh = new THREE.Mesh(
					new THREE.PlaneGeometry( 2000, 2000 ),
					new THREE.MeshPhongMaterial( { color: 0x999999, depthWrite: false } )
				);
				mesh.rotation.x = - Math.PI / 2;
				mesh.receiveShadow = true;
				scene.add( mesh );

				const grid = new THREE.GridHelper( 2000, 20, 0x000000, 0x000000 );
				grid.material.opacity = 0.2;
				grid.material.transparent = true;
				scene.add( grid );

				texture = textureLoader.load( 'models/textures/pintura.jpg' );
				texture.colorSpace = THREE.SRGBColorSpace;
				texture.flipY = false;

				const rgbeLoader = new RGBELoader();
				rgbeLoader.load( 'models/rgbe/blue_hour_8k.hdr', function ( hdrTexture ) {

					hdrTexture.mapping = THREE.EquirectangularReflectionMapping;
					scene.background = hdrTexture;
					scene.environment = hdrTexture;

				} );

				loader = new FBXLoader( manager );
				loadAsset( params.asset );

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				renderer.shadowMap.enabled = true;
				container.appendChild( renderer.domElement );

				const controls = new OrbitControls( camera, renderer.domElement );
				controls.target.set( 0, 100, 0 );
				controls.update();

				window.addEventListener( 'resize', onWindowResize );

				renderer.outputColorSpace = THREE.SRGBColorSpace;
				renderer.toneMapping = THREE.ACESFilmicToneMapping;
				renderer.toneMappingExposure = 1.0;

				stats = new Stats();
				container.appendChild( stats.dom );

				const gui = new GUI();
				gui.add( params, 'asset', assets ).onChange( function ( value ) {

					loadAsset( value );

				} );

				guiMorphsFolder = gui.addFolder( 'Morphs' ).hide();

				const listener = new THREE.AudioListener();
				camera.add( listener );

				sound = new THREE.Audio( listener );

				const audioLoader = new THREE.AudioLoader();
				audioLoader.load( 'models/audio/Snow-Informer.mp3', function ( buffer ) {

					sound.setBuffer( buffer );
					sound.setLoop( true );
					sound.setVolume( 0.5 );

				} );

				const startAudioButton = document.getElementById( 'startAudio' );
				startAudioButton.addEventListener( 'click', function () {

					if ( sound && sound.buffer && ! sound.isPlaying ) {

						sound.play();

					}

					startAudioButton.style.display = 'none';

				} );

			}

			function loadAsset( asset ) {

				loader.load( 'models/fbx/' + asset + '.fbx', function ( group ) {

					if ( object ) {

						object.traverse( function ( child ) {

							if ( child.isSkinnedMesh ) {

								child.skeleton.dispose();

							}

							if ( child.material ) {

								const materials = Array.isArray( child.material ) ? child.material : [ child.material ];
								materials.forEach( material => {

									if ( material.map && material.map !== texture ) material.map.dispose();
									material.dispose();

								} );

							}

							if ( child.geometry ) child.geometry.dispose();

						} );

						scene.remove( object );

					}

					object = group;

					if ( object.animations && object.animations.length ) {

						mixer = new THREE.AnimationMixer( object );

						const action = mixer.clipAction( object.animations[ 0 ] );
						action.play();

					} else {

						mixer = null;

					}

					guiMorphsFolder.children.forEach( ( child ) => child.destroy() );
					guiMorphsFolder.hide();

					object.traverse( function ( child ) {

						if ( child.isMesh ) {

							child.castShadow = true;
							child.receiveShadow = true;

							if ( child.material ) {

								const materials = Array.isArray( child.material ) ? child.material : [ child.material ];

								materials.forEach( ( material ) => {

									material.map = texture;
									material.transparent = false;
									material.opacity = 1;
									material.color.set( 0xffffff );

									if ( 'roughness' in material ) material.roughness = 0.35;
									if ( 'metalness' in material ) material.metalness = 0.22;

									if ( 'shininess' in material ) material.shininess = 75;
									if ( 'specular' in material ) material.specular.set( 0x555555 );

									if ( 'envMapIntensity' in material ) material.envMapIntensity = 0.8;

									material.needsUpdate = true;

								} );

							}

							if ( child.morphTargetDictionary ) {

								guiMorphsFolder.show();
								const meshFolder = guiMorphsFolder.addFolder( child.name || child.uuid );
								Object.keys( child.morphTargetDictionary ).forEach( ( key ) => {

									meshFolder.add( child.morphTargetInfluences, child.morphTargetDictionary[ key ], 0, 1, 0.01 );

								} );

							}

						}

					} );

					scene.add( object );

				} );

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			function animate() {

				const delta = clock.getDelta();

				if ( mixer ) mixer.update( delta );

				renderer.render( scene, camera );
				stats.update();

			}

		</script>

	</body>
</html>
