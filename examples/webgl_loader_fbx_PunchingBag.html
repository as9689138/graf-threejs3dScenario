<!DOCTYPE html>
<html lang="en">
<head>
	<title>three.js webgl - FBX loader</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link type="text/css" rel="stylesheet" href="main.css">
</head>

<body>
	<div id="info">
		<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - FBXLoader<br />
		Character and animation from <a href="https://www.mixamo.com/" target="_blank" rel="noopener">Mixamo</a>
	</div>

	<button id="startAudio" style="
		position:absolute;
		top:20px;
		right:20px;
		z-index:10;
		padding:10px 16px;
		border:none;
		border-radius:8px;
		background:rgba(0,0,0,0.7);
		color:white;
		cursor:pointer;
	">
		Activar música
	</button>

	<script type="importmap">
	{
		"imports": {
			"three": "../build/three.module.js",
			"three/addons/": "./jsm/"
		}
	}
	</script>

	<script type="module">
		import * as THREE from 'three';

		import Stats from 'three/addons/libs/stats.module.js';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
		import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
		import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

		const manager = new THREE.LoadingManager();

		let camera, scene, renderer, stats, object, loader, guiMorphsFolder;
		let mixer;
		let sound;

		let avatarTexture;
		let floorTexture;

		const textureLoader = new THREE.TextureLoader();
		const clock = new THREE.Clock();

		const params = {
			asset: 'Punching Bag'
		};

		const assets = [
			'Samba Dancing',
			'morph_test',
			'monkey',
			'monkey_embedded_texture',
			'vCube',
			'Swing Dancing',
			'Running',
			'Receive Uppercut To The Face',
			'Punching Bag',
			'Crouch To Stand'
		];

		init();

		function init() {

			const container = document.createElement('div');
			document.body.appendChild(container);

			camera = new THREE.PerspectiveCamera(
				55,
				window.innerWidth / window.innerHeight,
				1,
				2000
			);
			camera.position.set(0, 80, 350);

			scene = new THREE.Scene();
			scene.background = new THREE.Color(0xa0a0a0);

			const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2.0);
			hemiLight.position.set(0, 200, 0);
			scene.add(hemiLight);

			const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
			dirLight.position.set(0, 200, 100);
			dirLight.castShadow = true;
			dirLight.shadow.camera.top = 180;
			dirLight.shadow.camera.bottom = -100;
			dirLight.shadow.camera.left = -120;
			dirLight.shadow.camera.right = 120;
			scene.add(dirLight);

			const topLight = new THREE.DirectionalLight(0xffffff, 1.2);
			topLight.position.set(0, 300, 0);
			topLight.castShadow = true;
			scene.add(topLight);

			avatarTexture = textureLoader.load(
				'models/textures/pintura.jpg',
				() => console.log('✅ Textura del avatar cargada'),
				undefined,
				(error) => console.error('❌ Error cargando textura del avatar:', error)
			);
			avatarTexture.colorSpace = THREE.SRGBColorSpace;
			avatarTexture.flipY = false;

			floorTexture = textureLoader.load(
				'models/textures/tapeteTexture.jpg',
				() => console.log('✅ Textura del piso cargada'),
				undefined,
				(error) => console.error('❌ Error cargando textura del piso:', error)
			);
			floorTexture.colorSpace = THREE.SRGBColorSpace;
			floorTexture.wrapS = THREE.RepeatWrapping;
			floorTexture.wrapT = THREE.RepeatWrapping;
			floorTexture.repeat.set(6, 6);

			const floorMaterial = new THREE.MeshStandardMaterial({
				map: floorTexture,
				color: 0xffffff,
				roughness: 0.45,
				metalness: 0.6,
				envMapIntensity: 1.0
			});

			const floor = new THREE.Mesh(
				new THREE.PlaneGeometry(450, 450),
				floorMaterial
			);
			floor.rotation.x = -Math.PI / 2;
			floor.position.y = 0;
			floor.receiveShadow = true;
			scene.add(floor);

			renderer = new THREE.WebGLRenderer({ antialias: true });
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.setAnimationLoop(animate);
			renderer.shadowMap.enabled = true;
			renderer.outputColorSpace = THREE.SRGBColorSpace;
			renderer.toneMapping = THREE.ACESFilmicToneMapping;
			renderer.toneMappingExposure = 1.1;
			container.appendChild(renderer.domElement);

			const rgbeLoader = new RGBELoader();
			rgbeLoader.load(
				'models/rgbe/basement_boxing_ring_8k.hdr',
				function (hdrTexture) {
					hdrTexture.mapping = THREE.EquirectangularReflectionMapping;
					scene.background = hdrTexture;
					scene.environment = hdrTexture;

					scene.backgroundRotation.y = Math.PI / 2;
				},
				undefined,
				function (error) {
					console.error('❌ Error cargando HDR:', error);
				}
			);

			const controls = new OrbitControls(camera, renderer.domElement);
			controls.target.set(0, 40, 0);
			controls.update();

			window.addEventListener('resize', onWindowResize);

			stats = new Stats();
			container.appendChild(stats.dom);

			const gui = new GUI();
			gui.add(params, 'asset', assets).onChange(function (value) {
				loadAsset(value);
			});

			guiMorphsFolder = gui.addFolder('Morphs');
			guiMorphsFolder.hide();

			loader = new FBXLoader(manager);
			loadAsset(params.asset);

			const listener = new THREE.AudioListener();
			camera.add(listener);

			sound = new THREE.Audio(listener);

			const audioLoader = new THREE.AudioLoader();
			audioLoader.load(
				'models/audio/EyeOfTheTiger.mp3',
				function (buffer) {
					sound.setBuffer(buffer);
					sound.setLoop(true);
					sound.setVolume(0.5);
				},
				undefined,
				function (error) {
					console.error('❌ Error cargando audio:', error);
				}
			);

			const startAudioButton = document.getElementById('startAudio');
			startAudioButton.addEventListener('click', function () {
				if (sound && sound.buffer && !sound.isPlaying) {
					sound.play();
				}
				startAudioButton.style.display = 'none';
			});

		}

		function loadAsset(asset) {

			loader.load(
				'models/fbx/' + asset + '.fbx',
				function (group) {

					if (object) {

						object.traverse(function (child) {

							if (child.isSkinnedMesh && child.skeleton) {
								child.skeleton.dispose();
							}

							if (child.material) {
								const materials = Array.isArray(child.material)
									? child.material
									: [child.material];

								materials.forEach(material => {
									if (material.map && material.map !== avatarTexture) {
										material.map.dispose();
									}
									material.dispose();
								});
							}

							if (child.geometry) child.geometry.dispose();

						});

						scene.remove(object);

					}

					object = group;

					if (object.animations && object.animations.length) {
						mixer = new THREE.AnimationMixer(object);
						const action = mixer.clipAction(object.animations[0]);
						action.play();
					} else {
						mixer = null;
					}

					if (guiMorphsFolder) {
						guiMorphsFolder.children.forEach((child) => child.destroy());
						guiMorphsFolder.hide();
					}

					object.traverse(function (child) {

						if (child.isMesh) {

							child.castShadow = true;
							child.receiveShadow = true;

							if (child.material) {

								const materials = Array.isArray(child.material)
									? child.material
									: [child.material];

								materials.forEach((material) => {

									material.map = avatarTexture;
									material.transparent = false;
									material.opacity = 1;
									material.color.set(0xffffff);

									if ('roughness' in material) material.roughness = 0.22;
									if ('metalness' in material) material.metalness = 0.28;
									if ('shininess' in material) material.shininess = 75;
									if ('specular' in material) material.specular.set(0x555555);
									if ('envMapIntensity' in material) material.envMapIntensity = 1.15;

									material.needsUpdate = true;

								});

							}

							if (child.morphTargetDictionary && guiMorphsFolder) {

								guiMorphsFolder.show();
								const meshFolder = guiMorphsFolder.addFolder(child.name || child.uuid);

								Object.keys(child.morphTargetDictionary).forEach((key) => {
									meshFolder.add(
										child.morphTargetInfluences,
										child.morphTargetDictionary[key],
										0,
										1,
										0.01
									);
								});

							}

						}

					});

					object.position.set(0, 0, 0);
					scene.add(object);

				},
				undefined,
				function (error) {
					console.error('❌ Error cargando FBX:', error);
				}
			);

		}

		function onWindowResize() {

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);

		}

		function animate() {

			const delta = clock.getDelta();

			if (mixer) mixer.update(delta);

			renderer.render(scene, camera);

			if (stats) stats.update();

		}
	</script>
</body>
</html>
